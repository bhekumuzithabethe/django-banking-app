{% extends 'consultant/consultant.html' %}

{% load crispy_forms_tags %}

{% block main_content %}
    {% block main_content_title %}{% endblock main_content_title %}
    <div class="row">
        <div class="col-12 m-1">
            <div class="card bg-light  m-3">
                <div class="card-header"><i class="fa-solid fa-address-card fa-lg"></i> {% block card_hearder %}{% endblock card_hearder %}</div>
                <div class="card-body">
                  <form action="{% block form_action %}{% endblock form_action %}" method="POST">
                    {% csrf_token %}
                    {{form|crispy}}
                    <button type="submit" class="btn btn-primary"><i class="fa-regular fa-floppy-disk fa-lg"></i> {% block form_button %}{% endblock form_button %}</button>
                    <a href="{% block cancel_url %}{% endblock cancel_url %}" class="btn btn-primary"><i class="fa-solid fa-xmark fa-lg"></i> Cancel</a>
                  </form>
                </div>
              </div>
        </div>
    </div>

{% endblock main_content %}
